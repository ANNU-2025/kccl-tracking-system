{% extends "base.html" %}
{% block login_body %}
<div class="login-wrap">
    <div class="login-box">
        <div style="text-align:center;margin-bottom:20px">
            <div style="width:50px;height:50px;background:var(--blue);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin-bottom:14px"><i class="fas fa-server"></i></div>
            <h1>KCCL BANGLA</h1>
            <p>Enterprise Logistics System</p>
        </div>
        <form method="POST">
            <div class="fg"><label class="fl">Username</label><input type="text" name="username" class="fi" placeholder="Enter username" required autofocus></div>
            <div class="fg"><label class="fl">Password</label><input type="password" name="password" class="fi" placeholder="Enter password" required></div>
            <button type="submit" class="btn btn-blue" style="width:100%;justify-content:center;padding:11px;font-size:13px;margin-top:8px"><i class="fas fa-right-to-bracket"></i> SIGN IN</button>
        </form>
        <div class="flashes" style="margin-top:16px;margin-bottom:0">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}<div class="flash {{ cat }}"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>{% endfor %}
            {% endwith %}
        </div>
    </div>
</div>
{% endblock %}
