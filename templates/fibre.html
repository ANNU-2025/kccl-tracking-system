{% extends "base.html" %}
{% block title %}Fibre Manager{% endblock %}
{% block page_title %}Fibre Tracking{% endblock %}
{% block body %}

<div class="card">
    <div class="card-head"><div class="card-title"><i class="fas fa-network-wired" style="color:var(--purple)"></i> Fibre Management</div></div>
    <form method="POST">
        <div class="fbar" style="margin-bottom:0">
            <div class="fg" style="margin-bottom:0"><label class="fl">Drum ID</label><input type="text" name="drum_id" class="fi" placeholder="Drum identifier" required></div>
            <div class="fg" style="margin-bottom:0"><label class="fl">Length (M)</label><input type="number" name="length" class="fi" placeholder="0" step="0.1" required></div>
            <div class="fg" style="margin-bottom:0"><label class="fl">LCO / Dealer</label><input type="text" name="lco_name" class="fi" placeholder="LCO name"></div>
            <div class="fg" style="margin-bottom:0"><label class="fl">Action</label><select name="action" class="fs"><option>Issue</option><option>Return</option><option>Add New</option></select></div>
            <div class="fg" style="margin-bottom:0;display:flex;align-items:end"><button type="submit" class="btn btn-green"><i class="fas fa-check"></i> UPDATE FIBRE</button></div>
        </div>
    </form>
</div>
{% endblock %}
