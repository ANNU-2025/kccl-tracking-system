{% extends "base.html" %}
{% block title %}Inventory Manager{% endblock %}
{% block page_title %}Inventory Management{% endblock %}
{% block body %}

<div class="card" style="margin-bottom:18px">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(this,'matTab')"><i class="fas fa-microchip"></i> Hardware / Material</button>
        <button class="tab-btn" onclick="switchTab(this,'conTab')"><i class="fas fa-flask"></i> Consumables</button>
        <button class="tab-btn" onclick="switchTab(this,'bulkTab')"><i class="fas fa-file-excel"></i> Bulk Upload</button>
    </div>

    <div id="matTab" class="tab-panel active" style="padding-top:16px">
        <form method="POST" id="matForm"><input type="hidden" name="form_type" value="material">
            <div class="fbar" style="margin-bottom:0">
                <div class="fg" style="margin-bottom:0"><label class="fl">Item Code</label><input type="text" name="m_c" id="m_c" class="fi" placeholder="ONU-001" required></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Item Name</label><input type="text" name="m_n" id="m_n" class="fi" placeholder="Description"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Serial No</label><input type="text" name="m_s" class="fi" placeholder="Optional"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Quantity</label><input type="number" name="m_qty" class="fi" value="1" min="1"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Unit</label><select name="m_unit" class="fs"><option>Pcs</option><option>Box</option><option>Set</option></select></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Invoice</label><input type="text" name="m_invoice" class="fi" placeholder="Invoice ref"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Dealer</label><input type="text" name="m_d" class="fi" placeholder="Dealer name"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Action</label><select name="m_act" class="fs"><option>Issue</option><option>Add New</option><option>Return</option></select></div>
                <div class="fg" style="margin-bottom:0;display:flex;align-items:end"><button type="submit" class="btn btn-green"><i class="fas fa-check"></i> PROCESS</button></div>
            </div>
        </form>
    </div>

    <div id="conTab" class="tab-panel" style="padding-top:16px">
        <form method="POST" id="conForm"><input type="hidden" name="form_type" value="consumable">
            <div class="fbar" style="margin-bottom:0">
                <div class="fg" style="margin-bottom:0"><label class="fl">Item Code</label><input type="text" name="c_item" id="c_item" class="fi" placeholder="SPLITTER-2W" required></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Item Name</label><input type="text" name="c_name" id="c_name" class="fi" placeholder="Description"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Batch ID</label><input type="text" name="c_batch" class="fi" placeholder="Batch ref" required></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Quantity</label><input type="number" name="c_qty" class="fi" placeholder="0" step="0.1" required></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Unit</label><select name="c_unit" class="fs"><option>Pcs</option><option>Meter</option><option>Litre</option><option>Kg</option><option>Roll</option></select></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Invoice</label><input type="text" name="c_invoice" class="fi" placeholder="Invoice ref"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Dealer</label><input type="text" name="c_dealer" class="fi" placeholder="Dealer name"></div>
                <div class="fg" style="margin-bottom:0"><label class="fl">Action</label><select name="c_action" class="fs"><option>Issue</option><option>Add New</option><option>Return</option></select></div>
                <div class="fg" style="margin-bottom:0;display:flex;align-items:end"><button type="submit" class="btn btn-blue"><i class="fas fa-check"></i> PROCESS</button></div>
            </div>
        </form>
    </div>

    <div id="bulkTab" class="tab-panel" style="padding-top:16px">
        <form method="POST" action="{{ url_for('inventory_bulk') }}" enctype="multipart/form-data">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
                <div class="card" style="margin-bottom:0">
                    <div class="card-head" style="margin-bottom:10px"><div class="card-title"><i class="fas fa-cog" style="color:var(--blue)"></i> Upload Settings</div></div>
                    <div class="fg">
                        <label class="fl">Item Type</label>
                        <select name="item_category" id="itemCategory" class="fs">
                            <option value="material">Material / Hardware</option>
                            <option value="consumable">Consumable</option>
                        </select>
                    </div>
                    <div class="fg">
                        <label class="fl">Action</label>
                        <select name="bulk_action" class="fs">
                            <option value="add">Bulk Add New</option>
                            <option value="issue">Bulk Issue</option>
                            <option value="return">Bulk Return</option>
                        </select>
                    </div>
                    <div class="fg">
                        <label class="fl">Dealer (for Issue / Return)</label>
                        <input type="text" name="bulk_dealer" class="fi" placeholder="Dealer name">
                    </div>
                </div>
                <div class="card" style="margin-bottom:0">
                    <div class="card-head" style="margin-bottom:10px"><div class="card-title"><i class="fas fa-file-excel" style="color:var(--green)"></i> Excel File</div></div>
                    <div class="fg">
                        <label class="fl">Select File</label>
                        <input type="file" name="bulk_file" accept=".csv,.xlsx" class="fi" style="padding:8px" required>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:4px">
                        <button type="button" class="btn btn-outline" style="flex:1" onclick="dlTemplate()"><i class="fas fa-download"></i> Download Template</button>
                        <button type="submit" class="btn btn-green" style="flex:1"><i class="fas fa-upload"></i> Upload & Process</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
function switchTab(btn,id){document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.tab-panel').forEach(function(t){t.classList.remove('active')});btn.classList.add('active');document.getElementById(id).classList.add('active')}
function dlTemplate(){var cat=document.getElementById('itemCategory').value;window.location.href='/inventory/template/'+cat}
(function(){var mc=document.getElementById('m_c'),mn=document.getElementById('m_n'),cc=document.getElementById('c_item'),cn=document.getElementById('c_name');
function lookup(code,input){if(!code){input.style.background='#fff';return}input.style.background='#fff3e0';fetch('/item/lookup?code='+encodeURIComponent(code)).then(function(r){return r.json()}).then(function(d){if(d.name&&!input.value){input.value=d.name;input.style.background='#e8f5e9'}else{input.style.background='#fff'}}).catch(function(){input.style.background='#fff'})}
if(mc&&mn){mc.addEventListener('blur',function(){lookup(this.value.trim().toUpperCase(),mn)})}
if(cc&&cn){cc.addEventListener('blur',function(){lookup(this.value.trim().toUpperCase(),cn)})}})();
</script>
{% endblock %}
